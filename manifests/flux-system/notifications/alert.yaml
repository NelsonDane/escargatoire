apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: on-error
  namespace: flux-system
spec:
  providerRef:
    name: discord
  eventSeverity: error
  # Watches every Kustomization and HelmRelease in the cluster.
  eventSources:
    - kind: Kustomization
      name: "*"
      namespace: "*"
    - kind: HelmRelease
      name: "*"
      namespace: "*"
  exclusionList:
    - "waiting to be reconciled"
    - "waiting for"
