apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
  namespace: intel-gpu-resource-driver
spec:
  interval: 5m
  releaseName: intel-gpu-resource-driver
  chart:
    spec:
      chart: intel-gpu-resource-driver-chart
      version: 0.10.0
      sourceRef:
        kind: HelmRepository
        name: intel-gpu-resource-driver
        namespace: intel-gpu-resource-driver
  values:
    # https://github.com/intel/intel-resource-drivers-for-kubernetes/blob/main/charts/intel-gpu-resource-driver/README.md
    kubeletPlugin:
      privileged: true
      healthMonitoring:
        enabled: false
    cdi:
      staticPath: /var/cdi/static
      dynamicPath: /var/cdi/dynamic
    nodeFeatureRules:
      enabled: true
