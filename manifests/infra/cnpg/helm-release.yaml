apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 15m
  timeout: 10m
  releaseName: cnpg
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      clusterWide: true
