apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness
  namespace: sparkyfitness
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
    namespace: flux-system
  values:
    config:
      timezone: America/New_York
    postgresql:
      enabled: false
    externalDatabase:
      host: sparkyfitness-db-rw.apps.svc.cluster.local
      port: 5432
      database: sparkyfitness
      auth:
        existingSecret: sparkyfitness-db-owner-secret
    server:
      secrets:
        existingSecret: sparkyfitness-app-secret
      appDatabase:
        existingSecret: sparkyfitness-appdb-secret
    frontend:
      podSecurityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
          add: [CHOWN, NET_BIND_SERVICE, SETGID, SETUID]

    global:
      storageClass: longhorn-strict-local
    ingress:
      enabled: false
    httpRoute:
      enabled: true
      hostname: fitness.nelsondane.com
      parentRef:
        name: cilium-gateway
        namespace: cilium
