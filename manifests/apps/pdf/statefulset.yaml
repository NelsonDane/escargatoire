apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pdf
  namespace: apps
spec:
  serviceName: pdf
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: pdf
  template:
    metadata:
      labels:
        app: pdf
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      restartPolicy: Always
      containers:
        - name: pdf
          image: ghcr.io/alam00000/bentopdf-simple:latest@sha256:bd1c4dcebe5006be99efd998858fccd818a3b52bdcadd0e3c8372abaa22a3e82
          ports:
            - containerPort: 8080
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            tcpSocket:
              port: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
          volumeMounts:
            - name: nginx-conf-tmp
              mountPath: /etc/nginx/conf.d
            - name: nginx-tmp
              mountPath: /etc/nginx/tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx/
      volumes:
        - name: nginx-conf-tmp
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
