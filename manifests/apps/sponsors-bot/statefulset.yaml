apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sponsors-bot
  namespace: apps
spec:
  serviceName: sponsors-bot
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: sponsors-bot
  template:
    metadata:
      labels:
        app: sponsors-bot
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      restartPolicy: Always
      containers:
        - name: sponsors-bot-worker
          image: ghcr.io/nelsondane/sponsors-bot:latest@sha256:34aaa93b97f2675095379554215717f0f81b6002782a9370693c38f19653521e
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "main"]
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "main"]
        - name: sponsors-bot-web
          image: ghcr.io/nelsondane/sponsors-bot-web:latest@sha256:7972372a50c1ff0374174e802f0cd9c18294c8d6675bcaaf98dbb25228541922
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "web"]
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "web"]
        - name: cloudflare
          image: cloudflare/cloudflared:latest@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
          command:
            [
              "cloudflared",
              "tunnel",
              "--no-autoupdate",
              "--loglevel",
              "info",
              "--metrics",
              "0.0.0.0:2000",
              "run",
            ]
          envFrom:
            - configMapRef:
                name: sponsors-bot-tunnel
          ports:
            - containerPort: 2000
              name: metrics
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          secret:
            secretName: sponsors-bot-config
        - name: tunnel
          configMap:
            name: sponsors-bot-tunnel
