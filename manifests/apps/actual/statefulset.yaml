apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: actual
  namespace: apps
spec:
  serviceName: actual
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: actual
  template:
    metadata:
      labels:
        app: actual
    spec:
      enableServiceLinks: false # https://github.com/actualbudget/actual/issues/4920#issuecomment-2858039347
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      restartPolicy: Always
      containers:
        - name: actual
          image: docker.io/actualbudget/actual-server:latest-alpine@sha256:996f3a59d297ec9699cb36ce558b61ab16d79c76763a5c3158d5387f71161499
          ports:
            - containerPort: 5006
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: actual-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - node
                - src/scripts/health-check.js
          readinessProbe:
            exec:
              command:
                - node
                - src/scripts/health-check.js
        - name: sync
          image: docker.io/seriouslag/actual-auto-sync:latest@sha256:a8f531f5d398591bc2cf6f1dd996b6452c17ff85e4eb8d0c371b43f1cccaace5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: actual-auto-sync
          env:
            - name: CRON_SCHEDULE
              value: "0 1 * * *"
            - name: TIMEZONE
              value: "America/New_York"
            - name: LOG_LEVEL
              value: "info"
            - name: RUN_ON_START
              value: "false"
            - name: SKIP_FAILED_ACCOUNTS
              value: "false"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - process.exit(0)
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - process.exit(0)
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: sync-data
              mountPath: /data
      volumes:
        - name: sync-data
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: actual-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        storageClassName: longhorn
