apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: umami
  namespace: apps
spec:
  interval: 1h
  chart:
    spec:
      chart: umami
      version: "7.7.15"
      sourceRef:
        kind: HelmRepository
        name: christianhuth
        namespace: apps
      interval: 12h

  values:
    # we use cnpg
    postgresql:
      enabled: false
    mysql:
      enabled: false
    externalDatabase:
      hostname: "umami-postgres-rw.apps.svc.cluster.local"
      port: 5432
      type: postgresql
      auth:
        database: umami
        username: umami
        password: ""

    database:
      existingSecret: umami-db-url
      databaseUrlKey: DATABASE_URL

    umami:
      appSecret:
        existingSecret: umami-app-secret

      # Umami settings
      disableBotCheck: "0"
      disableLogin: "0"
      disableTelemetry: "1"
      disableUpdates: "1"
      enableTestConsole: "0"
      forceSSL: "0"
      logQuery: "0"
      removeDisableLoginEnv: true
      hostname: "0.0.0.0"

    # public route
    ingress:
      enabled: false
    route:
      main:
        enabled: true
        hostnames:
          - analytics.nelsondane.com
        parentRefs:
          - name: cilium-gateway
            namespace: cilium
        matches:
          - path:
              type: PathPrefix
              value: /

    # pod security
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    # deployment security
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
