apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prowlarr
  namespace: media
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Prowlarr
    gethomepage.dev/description: Indexer Manager
    gethomepage.dev/group: Media
    gethomepage.dev/icon: prowlarr.png
    gethomepage.dev/widget.type: prowlarr
    gethomepage.dev/widget.url: https://prowlarr.cluster.nelsondane.com
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_PROWLARR}}"
    gethomepage.dev/pod-selector: "app=prowlarr"
    gethomepage.dev/weight: "10"
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: cilium
  hostnames:
    - prowlarr.cluster.nelsondane.com
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: prowlarr
          port: 9696
