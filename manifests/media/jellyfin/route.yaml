apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin
  namespace: media
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Jellyfin
    gethomepage.dev/description: Media Server
    gethomepage.dev/group: Media
    gethomepage.dev/icon: jellyfin.png
    gethomepage.dev/widget.type: jellyfin
    gethomepage.dev/widget.url: https://jellyfin.cluster.nelsondane.com
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_JELLYFIN}}"
    gethomepage.dev/pod-selector: "app=jellyfin"
    gethomepage.dev/weight: "10"
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: cilium
  hostnames:
    - jellyfin.cluster.nelsondane.com
    - jellyfin.nelsondane.com
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: jellyfin
          port: 8096
