apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radarr
  namespace: media
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Radarr
    gethomepage.dev/description: Movie Manager
    gethomepage.dev/group: Media
    gethomepage.dev/icon: radarr.png
    gethomepage.dev/widget.type: radarr
    gethomepage.dev/widget.url: https://radarr.cluster.nelsondane.com
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_RADARR}}"
    gethomepage.dev/pod-selector: "app=radarr"
    gethomepage.dev/weight: "10"
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: cilium
  hostnames:
    - radarr.cluster.nelsondane.com
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: radarr
          port: 7878