apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonarr
  namespace: media
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Sonarr
    gethomepage.dev/description: TV Manager
    gethomepage.dev/group: Media
    gethomepage.dev/icon: sonarr.png
    gethomepage.dev/widget.type: sonarr
    gethomepage.dev/widget.url: https://sonarr.cluster.nelsondane.com
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_SONARR}}"
    gethomepage.dev/pod-selector: "app=sonarr"
    gethomepage.dev/weight: "10"
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: cilium
  hostnames:
    - sonarr.cluster.nelsondane.com
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: sonarr
          port: 8989